name: app_coordinacion_comunitaria
description: App de Coordinación Comunitaria para la Gestión Urbana Participativa — Grupo D, UNNOBA 2026.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Maps & Location ───────────────────────────────────────────────────────
  google_maps_flutter: ^2.7.0
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # ── Speech to Text (on-device, sin API externa) ───────────────────────────
  speech_to_text: ^7.0.0

  # ── Media ─────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ── Serialización / Modelos ───────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # ── Utilidades ────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lint
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
